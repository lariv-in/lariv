name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work

      - name: Build all deployments
        run: |
          mkdir -p dist
          for dir in deployments/*/; do
            name=$(basename "$dir")
            echo "Building $name..."
            go build -ldflags "-s -w" -o "dist/${name}" "./${dir}"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
